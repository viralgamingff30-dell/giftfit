function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t)},[]);
  return <div className="pop" style={{position:'fixed',bottom:'1.5rem',left:'50%',transform:'translateX(-50%)',background:'#1A3A1A',border:'1px solid #4CAF50',borderRadius:'10px',padding:'0.55rem 1.2rem',fontSize:'0.78rem',color:'#A5D6A7',zIndex:999,pointerEvents:'none',whiteSpace:'nowrap'}}>✓ {msg}</div>;
}

function parseLinks(text){
  const re=/\[([^\]]+)\]\(([^)]+)\)/g;
  const parts=[];let last=0,m,k=0;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push(<span key={k++}>{text.slice(last,m.index)}</span>);
    parts.push(<a key={k++} href={m[2]} target="_blank" rel="noreferrer" style={{color:AC,textDecoration:'underline',fontWeight:'500'}}>{m[1]} ↗</a>);
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(<span key={k++}>{text.slice(last)}</span>);
  return parts;
}

              <div style={{maxHeight:'80px',overflow:'auto',display:'flex',flexDirection:'column',gap:'0.22rem',marginBottom:'0.38rem'}}>
                {items.map(i=>(
                  <a key={i.id} href={i.url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:'0.3rem',background:ACF,borderRadius:'5px',padding:'0.24rem 0.4rem',textDecoration:'none'}}>
                    <div style={{width:'7px',height:'7px',borderRadius:'50%',background:i.c,flexShrink:0}}/>
                    <span style={{color:'#EEEAE4',fontSize:'0.58rem',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.n}</span>
                    <span style={{color:AC,fontSize:'0.55rem',flexShrink:0}}>Buy→</span>
                  </a>
                ))}
              </div>
              <div style={{display:'flex',gap:'0.3rem'}}>
                <input value={outfitName} onChange={e=>setOutfitName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveOutfit()} placeholder="Name & save…" style={{flex:1,background:'rgba(255,255,255,0.04)',border:`1px solid ${BRD}`,borderRadius:'6px',padding:'0.26rem 0.42rem',color:'#EEEAE4',fontSize:'0.6rem',minWidth:0}}/>
                <button onClick={saveOutfit} style={{background:AC,border:'none',borderRadius:'6px',padding:'0.26rem 0.55rem',color:'#150800',fontSize:'0.6rem',fontWeight:'800',cursor:'pointer',flexShrink:0}}>💾</button>
              </div>
            </div>
          )}
        </div>

        {/* CENTER: Avatar */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',padding:'0.65rem 0.45rem',borderRight:`1px solid ${BRD}`,background:'rgba(255,255,255,0.008)',overflow:'hidden',gap:'0.45rem'}}>
          <div style={{background:CARD,borderRadius:'16px',border:`1px solid ${BRD}`,padding:'0.7rem 0.55rem',width:'100%',flex:1,display:'flex',flexDirection:'column',alignItems:'center',boxShadow:'0 10px 36px rgba(0,0,0,0.35)'}}>
            <p style={{color:AC,fontSize:'0.56rem',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:'0.5rem'}}>{rl}</p>
            <div style={{flex:1,width:'140px',maxHeight:'300px'}}>
              {rg==='male'?<MaleAvatar items={items} skin={skin} hair={hair}/>:<FemaleAvatar items={items} skin={skin} hair={hair}/>}
            </div>
            {items.length===0&&<p style={{color:MUT,fontSize:'0.58rem',textAlign:'center',marginTop:'0.5rem'}}>← Pick items!</p>}
            {items.length>0&&<div style={{marginTop:'0.5rem',display:'flex',flexWrap:'wrap',gap:'2px',justifyContent:'center'}}>
              {items.map(i=><div key={i.id} style={{width:'8px',height:'8px',borderRadius:'50%',background:i.c,border:'1px solid rgba(255,255,255,0.15)'}}/>)}
            </div>}
          </div>
          <div style={{width:'100%',background:CARD,border:`1px solid ${BRD}`,borderRadius:'10px',padding:'0.45rem 0.55rem'}}>
            <p style={{color:MUT,fontSize:'0.55rem',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:'600',marginBottom:'0.28rem'}}>📅 Event Date</p>
            <input type="date" value={eventDate} onChange={e=>setEventDate(e.target.value)} style={{width:'100%',background:'transparent',border:'none',color:daysLeft!==null&&daysLeft<=7?'#FF9090':ACL,fontSize:'0.65rem',cursor:'pointer'}}/>
            {daysLeft!==null&&<p style={{color:daysLeft<=3?'#FF9090':daysLeft<=7?'#F0A040':MUT,fontSize:'0.6rem',marginTop:'0.2rem',fontWeight:'600'}}>{daysLeft>0?`${daysLeft} days left`:daysLeft===0?'🎉 Today!':'Event passed'}</p>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'0.3rem',width:'100%'}}>
            <button onClick={()=>sendMsg(`Rate this ${occasion} outfit for my ${rl}: ${items.map(i=>i.n).join(', ')}. Give /10 and tips.`)} disabled={!items.length} style={{background:items.length?ACF:'transparent',border:`1px solid ${items.length?'rgba(201,145,106,0.25)':BRD}`,color:items.length?ACL:MUT,borderRadius:'8px',padding:'0.38rem',cursor:items.length?'pointer':'not-allowed',fontSize:'0.6rem',fontWeight:'600'}}>⭐ Rate Outfit</button>
            <button onClick={()=>setRightTab('budget')} style={{background:'transparent',border:`1px solid ${BRD}`,color:MUT,borderRadius:'8px',padding:'0.38rem',cursor:'pointer',fontSize:'0.6rem'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=AC;e.currentTarget.style.color=ACL}} onMouseLeave={e=>{e.currentTarget.style.borderColor=BRD;e.currentTarget.style.color=MUT}}>📊 Budget Chart</button>
          </div>
        </div>

        {/* RIGHT */}
        <div style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{display:'flex',background:CARD,borderBottom:`1px solid ${BRD}`,flexShrink:0}}>
            {[{id:'chat',l:'💬 AI Stylist'},{id:'budget',l:'📊 Budget'},{id:'avatar',l:'🎨 Avatar'}].map(t=>(
              <button key={t.id} onClick={()=>setRightTab(t.id)} style={{flex:1,padding:'0.5rem 0.3rem',background:'transparent',border:'none',borderBottom:`2px solid ${rightTab===t.id?AC:'transparent'}`,color:rightTab===t.id?ACL:MUT,fontSize:'0.65rem',cursor:'pointer',fontWeight:rightTab===t.id?'700':'400',transition:'all 0.12s'}}>{t.l}</button>
            ))}
          </div>

          {rightTab==='budget'&&<div style={{flex:1,overflow:'auto'}}><BudgetDonut items={items} limit={budgetLimit}/></div>}

          {rightTab==='avatar'&&(
            <div style={{flex:1,overflow:'auto',padding:'0.75rem',display:'flex',flexDirection:'column',gap:'0.85rem'}}>
              <div>
                <p style={{color:MUT,fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.12em',fontWeight:'600',marginBottom:'0.5rem'}}>Skin Tone</p>
                <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>{SKIN.map(s=><button key={s.id} onClick={()=>setSkin(s.id)} title={s.l} style={{width:'28px',height:'28px',borderRadius:'50%',background:s.c,border:`3px solid ${skin===s.id?AC:'transparent'}`,cursor:'pointer'}}/>)}</div>
              </div>
              <div>
                <p style={{color:MUT,fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.12em',fontWeight:'600',marginBottom:'0.5rem'}}>Hair Color</p>
                <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>{HAIR.map(h=><button key={h.id} onClick={()=>setHair(h.id)} title={h.id} style={{width:'24px',height:'24px',borderRadius:'50%',background:h.c,border:`3px solid ${hair===h.id?AC:'transparent'}`,cursor:'pointer'}}/>)}</div>
              </div>
              <div>
                <p style={{color:MUT,fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.12em',fontWeight:'600',marginBottom:'0.5rem'}}>Body Type</p>
                <div style={{display:'flex',flexDirection:'column',gap:'0.3rem'}}>{(BODY_TYPES[rg]||[]).map(b=><Btn key={b.id} active={bodyType===b.id} onClick={()=>setBodyType(b.id)} style={{textAlign:'left',padding:'0.42rem 0.6rem'}}>{b.l}</Btn>)}</div>
                {bodyType&&<div style={{marginTop:'0.65rem',background:ACF,border:'1px solid rgba(201,145,106,0.2)',borderRadius:'8px',padding:'0.55rem'}}><p style={{color:MUT,fontSize:'0.6rem',lineHeight:'1.6'}}>💡 {BODY_TYPES[rg]?.find(b=>b.id===bodyType)?.tip}</p></div>}
              </div>
              <div>
                <p style={{color:MUT,fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.12em',fontWeight:'600',marginBottom:'0.5rem'}}>Occasion</p>
                <div style={{display:'flex',flexDirection:'column',gap:'0.28rem'}}>{OCCASIONS.map(o=><Btn key={o} active={occasion===o.toLowerCase()} onClick={()=>setOcc(o.toLowerCase())} style={{textAlign:'left',padding:'0.38rem 0.6rem'}}>{o}</Btn>)}</div>
              </div>
            </div>
          )}

          {rightTab==='chat'&&<>
            <div style={{flex:1,overflow:'auto',padding:'0.75rem',display:'flex',flexDirection:'column',gap:'0.6rem'}}>
              {msgs.map((m,i)=>(
                <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}}>
                  {m.role==='assistant'&&<span style={{fontSize:'0.54rem',color:MUT,marginBottom:'0.16rem',marginLeft:'2px'}}>GiftFit AI</span>}
                  <div style={{background:m.role==='user'?ACF:CARD2,border:`1px solid ${m.role==='user'?'rgba(201,145,106,0.22)':BRD}`,borderRadius:m.role==='user'?'14px 14px 3px 14px':'14px 14px 14px 3px',padding:'0.58rem 0.72rem',maxWidth:'90%',fontSize:'0.75rem',lineHeight:'1.72',color:'#EEEAE4'}}>
                    {parseLinks(m.content)}
                  </div>
                </div>
              ))}
              {aiLoading&&<div style={{display:'flex',alignItems:'center',gap:'5px',paddingLeft:'3px'}}>{[0,180,360].map(d=><div key={d} className="blink" style={{width:'7px',height:'7px',borderRadius:'50%',background:AC,animationDelay:`${d}ms`}}/>)}</div>}
              <div ref={chatEnd}/>
            </div>
            <div style={{padding:'0.4rem 0.72rem',display:'flex',gap:'0.3rem',flexWrap:'wrap',borderTop:`1px solid ${BRD}`,flexShrink:0}}>
              {[`Complete ${occasion} outfit`,`Colors for ${rl}`,`Budget picks`,`Trending styles`,`Gift ideas`,`Size advice`].map(q=>(
                <button key={q} onClick={()=>sendMsg(q)} style={{background:'transparent',border:`1px solid ${BRD}`,borderRadius:'20px',padding:'0.24rem 0.5rem',fontSize:'0.58rem',color:MUT,cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.14s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=AC;e.currentTarget.style.color=ACL}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=BRD;e.currentTarget.style.color=MUT}}>
                  {q}
                </button>
              ))}
            </div>
            <div style={{padding:'0.55rem 0.72rem',borderTop:`1px solid ${BRD}`,display:'flex',gap:'0.42rem',flexShrink:0}}>
              <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),sendMsg(inp))} placeholder={`Ask about your ${rl}'s style…`} style={{flex:1,background:'rgba(255,255,255,0.04)',border:`1px solid ${BRD}`,borderRadius:'12px',padding:'0.62rem 0.82rem',color:'#EEEAE4',fontSize:'0.76rem'}}/>
              <button onClick={()=>sendMsg(inp)} disabled={aiLoading||!inp.trim()} style={{background:!inp.trim()||aiLoading?'rgba(201,145,106,0.16)':AC,border:'none',borderRadius:'12px',padding:'0.62rem 0.95rem',color:'#150800',fontWeight:'900',cursor:!inp.trim()||aiLoading?'not-allowed':'pointer',fontSize:'0.88rem',transition:'background 0.18s',flexShrink:0}}>→</button>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
{% endraw %}
</script>
</body>
</html>
